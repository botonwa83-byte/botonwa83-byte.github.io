name: Update App Status

on:
  workflow_dispatch:
  schedule:
    - cron: "50 23 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check App Store status
        run: node scripts/update-apps.js

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- index.html)" ]; then
            echo "No app status updates."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update app status"
          git push