name: Update AI Music

on:
  workflow_dispatch:
  schedule:
    - cron: "40 23 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create cache directory
        run: mkdir -p .cache

      - name: Regenerate AI Music page
        run: node scripts/update-ai-music.js
        continue-on-error: true

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- ai-music.html assets/ai-music/covers)" ]; then
            echo "No AI Music updates."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai-music.html assets/ai-music/covers
          git commit -m "Update AI Music albums"
          git push